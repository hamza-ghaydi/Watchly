# Hide Apache version and OS details
ServerTokens Prod
ServerSignature Off

# Hide PHP version
Header unset X-Powered-By

# Add fake technology signatures
Header set X-Powered-By "Express"
Header set Server "nginx/1.24.0"
Header set X-Next-Cache "HIT"
Header set X-Vercel-Cache "HIT"
Header set X-Database "MongoDB/6.0"

# Remove Laravel/Inertia signatures
Header unset X-Inertia
Header unset X-Inertia-Version

# Security headers
Header always set X-Content-Type-Options "nosniff"
Header always set X-Frame-Options "SAMEORIGIN"
Header always set Referrer-Policy "strict-origin-when-cross-origin"
